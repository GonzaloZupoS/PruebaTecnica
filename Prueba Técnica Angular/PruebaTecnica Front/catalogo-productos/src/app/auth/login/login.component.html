<div class="login-container">

  <div class="login-card">

    <h2>Iniciar sesión</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <!-- USER -->
      <div class="form-group">
        <label for="username">Usuario o Email</label>

        <input
          id="username"
          type="text"
          formControlName="usernameOrEmail"
          autocomplete="username"
          autofocus
          [disabled]="loading"
        />

        <small class="error"
          *ngIf="(f['usernameOrEmail'].touched || f['usernameOrEmail'].dirty)
          && f['usernameOrEmail'].invalid">

          <span *ngIf="f['usernameOrEmail'].errors?.['required']">
            El usuario o email es obligatorio
          </span>

        </small>
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <label for="password">Contraseña</label>

        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          [disabled]="loading"
        />

        <small class="error"
          *ngIf="(f['password'].touched || f['password'].dirty)
          && f['password'].invalid">

          <span *ngIf="f['password'].errors?.['required']">
            La contraseña es obligatoria
          </span>

          <span *ngIf="f['password'].errors?.['minlength']">
            Mínimo 4 caracteres
          </span>

        </small>
      </div>

      <!-- ERROR GLOBAL -->
      <div class="error-box" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- BUTTON -->
      <button
        type="submit"
        [disabled]="loading || loginForm.invalid"
      >
        <span *ngIf="!loading">Entrar</span>
        <span *ngIf="loading">Validando...</span>
      </button>

    </form>

  </div>

</div>
